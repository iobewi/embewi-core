name: Docs

# Build Sphinx + déploiement GitHub Pages.
# Prérequis (une fois) : repo → Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; annule les builds Pages en cours.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r docs/requirements.txt
      # -W : les warnings Sphinx (lien cassé, doc hors toctree…) font échouer le build.
      - run: sphinx-build -b html -W --keep-going docs docs/_build/html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
