apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: embewi-core
rules:
  # CRDs Embewi
  - apiGroups: ["embewi.io"]
    resources: ["mcunodes", "mcudeployments", "mcuconfigmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["embewi.io"]
    resources: ["mcunodes/status", "mcudeployments/status"]
    verbs: ["get", "update", "patch"]

  # Service + EndpointSlice (McuNode controller)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Secret tokens Bearer
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
