apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcuconfigmaps.embewi.io
spec:
  group: embewi.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            data:
              type: object
              description: |
                Paires clé/valeur poussées vers le NVS de l'agent via POST /config.
                Clé : 15 caractères max. Valeur : 63 caractères max (limites agent §4a).
              additionalProperties:
                type: string
  scope: Namespaced
  names:
    plural: mcuconfigmaps
    singular: mcuconfigmap
    kind: McuConfigMap
    shortNames:
      - mcucm
