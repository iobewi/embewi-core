apiVersion: v1
kind: Namespace
metadata:
  name: embewi-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embewi-core
  namespace: embewi-system
  labels:
    app: embewi-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embewi-core
  template:
    metadata:
      labels:
        app: embewi-core
    spec:
      serviceAccountName: embewi-core
      containers:
        - name: controller
          image: embewi/core:latest
          imagePullPolicy: IfNotPresent
          args:
            - --heartbeat-address=:8080
            - --metrics-bind-address=:8082
            - --health-probe-address=:8083
            - --token-secret=embewi-tokens
          ports:
            - name: heartbeat
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8082
              protocol: TCP
            - name: healthz
              containerPort: 8083
              protocol: TCP
          env:
            - name: OCI_INSECURE_TLS
              value: "true"                # à retirer si le registre a un cert valide
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: embewi-core-heartbeat
  namespace: embewi-system
  labels:
    app: embewi-core
spec:
  type: NodePort
  selector:
    app: embewi-core
  ports:
    - name: heartbeat
      port: 8080
      targetPort: 8080
      nodePort: 30880   # port accessible par les ESP sur le réseau local
      protocol: TCP
