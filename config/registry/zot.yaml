apiVersion: v1
kind: Namespace
metadata:
  name: embewi-registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: embewi-registry
  labels:
    app: zot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zot
  template:
    metadata:
      labels:
        app: zot
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-arm64:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          hostPath:
            path: /var/lib/zot
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: zot
  namespace: embewi-registry
  labels:
    app: zot
spec:
  type: NodePort
  selector:
    app: zot
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
      protocol: TCP
